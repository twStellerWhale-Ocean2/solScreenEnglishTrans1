<svg xmlns="http://www.w3.org/2000/svg" width="440" height="250" viewBox="0 0 440 250" font-family="Segoe UI, Microsoft JhengHei, sans-serif">
  <!-- #199 關於頁「更新紀錄」鈕移至「檢查更新」之後（更新區下方）：預覽（版面示意；實機外觀待 USR 手測） -->
  <rect x="0" y="0" width="440" height="250" fill="#FDF5F8"/>
  <!-- About 卡 -->
  <rect x="12" y="12" width="416" height="226" rx="8" fill="#FBFCFF" stroke="#F4C2D0" stroke-width="1"/>
  <!-- 左：logo -->
  <rect x="30" y="40" width="72" height="72" rx="10" fill="#FCE4EC" stroke="#F4C2D0"/>
  <text x="66" y="83" font-size="11" fill="#B0578D" text-anchor="middle">logo</text>
  <!-- 右：資訊欄 -->
  <text x="122" y="46" font-size="17" font-weight="600" fill="#B0578D">LingoIsland</text>
  <text x="122" y="66" font-size="12" fill="#9A6A82">版本 v3.8.1</text>
  <text x="122" y="86" font-size="11.5" fill="#9A6A82">© 2026 Carlton Chen．保留一切權利。</text>
  <text x="122" y="104" font-size="11" fill="#B0578D">GitHub</text>

  <!-- 更新區（檢查更新，恆先） -->
  <g>
    <text x="122" y="140" font-size="12" fill="#9A6A82">已是最新版本</text>
    <rect x="212" y="128" width="76" height="24" rx="5" fill="#FFF" stroke="#F4C2D0"/>
    <text x="250" y="144" font-size="12" fill="#B0578D" text-anchor="middle">檢查更新</text>
  </g>
  <text x="122" y="166" font-size="9.5" fill="#B692A6">↑ 更新區（僅安裝版顯示）</text>

  <!-- 更新紀錄鈕（移至其後·下方；恆顯） -->
  <g>
    <rect x="122" y="182" width="76" height="24" rx="5" fill="#FFF" stroke="#F4C2D0"/>
    <text x="160" y="198" font-size="12" fill="#B0578D" text-anchor="middle">更新紀錄</text>
  </g>
  <text x="122" y="222" font-size="9.5" fill="#B692A6">↑ #199：移至「檢查更新」之後（更新區之外、任何形態恆顯）</text>
</svg>
